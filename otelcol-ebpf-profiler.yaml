# Configuration pour otelcol-ebpf-profiler
# --feature-gates=+service.profilesSupport,+otelcol.resourcedetection.processcontext
# Le feature gate processcontext permet de lire OTEL_SERVICE_NAME depuis /proc/<pid>/environ

receivers:
  profiling:
    include_env_vars: "OTEL_SERVICE_NAME"

processors:
  transform/add_service_name:
    error_mode: ignore
    profile_statements:
      - context: resource
        statements:
          - set(attributes["service.name"], attributes["process.environment_variable.OTEL_SERVICE_NAME"])
            where attributes["process.environment_variable.OTEL_SERVICE_NAME"] != nil

exporters:
  otlp_http/pyroscope:
    endpoint: "http://pyroscope:4040"
    tls:
      insecure: true

  debug:
    verbosity: detailed

service:
  pipelines:
    profiles:
      receivers: [profiling]
      processors: [transform/add_service_name]
      exporters: [otlp_http/pyroscope]

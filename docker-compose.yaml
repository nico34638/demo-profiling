services:
  demo-app:
    build: ./app
    ports:
      - "8080:8080"
    environment:
      - OTEL_SERVICE_NAME=demo-profiling-app
      - OTEL_RESOURCE_ATTRIBUTES=service.name=demo-profiling-app
    restart: unless-stopped

  demo-app-node:
    build: ./app-node
    ports:
      - "8081:8081"
    environment:
      - OTEL_SERVICE_NAME=demo-profiling-app-node
      - OTEL_RESOURCE_ATTRIBUTES=service.name=demo-profiling-app-node
    restart: unless-stopped

  # Monte debugfs et tracefs dans la VM Docker Desktop (requis par eBPF)
  mount-kernel-fs:
    image: alpine:latest
    privileged: true
    pid: host
    command: >
      sh -c "
        nsenter --mount=/proc/1/ns/mnt -- sh -c '
          mountpoint -q /sys/kernel/debug  || mount -t debugfs  debugfs  /sys/kernel/debug;
          mountpoint -q /sys/kernel/tracing || mount -t tracefs tracefs /sys/kernel/tracing;
          echo done
        '
      "
    restart: "no"

  # OTel Collector — reçoit les traces de l'app et les route vers Tempo
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - tempo

  # OTel eBPF Profiler — profile tous les processus de la VM via eBPF
  otelcol-ebpf-profiler:
    image: otel/opentelemetry-collector-ebpf-profiler:latest
    pid: host
    privileged: true
    command:
      - --feature-gates=+service.profilesSupport
      - --config=/etc/otelcol-ebpf-profiler.yaml
    volumes:
      - ./otelcol-ebpf-profiler.yaml:/etc/otelcol-ebpf-profiler.yaml
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /sys/kernel/tracing:/sys/kernel/tracing:ro
      - /proc:/proc:ro
    depends_on:
      mount-kernel-fs:
        condition: service_completed_successfully
      pyroscope:
        condition: service_started
      tempo:
        condition: service_started

  pyroscope:
    image: grafana/pyroscope:latest
    ports:
      - "4040:4040"

  # Tempo — stockage des traces distribuées
  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml
    ports:
      - "3200:3200"

  # Grafana — visualisation unifiée traces + profils + métriques
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_FEATURE_TOGGLES_ENABLE=flameGraph traceToProfiles
      - GF_INSTALL_PLUGINS=grafana-pyroscope-app
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - tempo
      - pyroscope

volumes:
  pyroscope-data:
  tempo-data:
  grafana-data:
